<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Craft</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #87CEEB; }
        canvas { display: block; }
        
        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            pointer-events: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.8);
            box-shadow: 0 0 2px rgba(0,0,0,0.8);
        }
        #crosshair::before { width: 2px; height: 20px; left: 9px; }
        #crosshair::after { width: 20px; height: 2px; top: 9px; }

        /* HUD and Instructions */
        #hud {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5); color: white;
            padding: 10px 20px; border-radius: 5px;
            font-size: 14px; z-index: 10; text-align: center;
        }
        #hotbar {
            position: absolute; bottom: 60px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 5px; z-index: 10;
        }
        .slot {
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: white;
        }
        .slot.active { border-color: white; background: rgba(255,255,255,0.2); }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; cursor: pointer;
        }
        h1 { font-size: 3em; margin-bottom: 10px; text-shadow: 2px 2px 0px #555; }
        p { font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>VOXELCRAFT</h1>
        <p>Click to Play</p>
        <p style="font-size: 0.9em; opacity: 0.7;">WASD to move | Space to jump | Mouse to look | Left-Click to break | Right-Click to place | 1-3 to select block</p>
    </div>

    <div id="crosshair"></div>
    
    <div id="hotbar">
        <div class="slot active" id="slot-1">🟩</div>
        <div class="slot" id="slot-2">🟫</div>
        <div class="slot" id="slot-3">⬜</div>
    </div>

    <div id="hud">Selected: Grass</div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- PointerLockControls for FPS camera -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- 1. SETUP SCENE, CAMERA, RENDERER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 20, 60); // Fog for performance and aesthetics

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // --- 3. PROCEDURAL TEXTURES ---
        // We generate textures via canvas to avoid external image files
        function createTexture(color, noiseColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, 16, 16);
            
            // Add noise for a pixelated, blocky look
            for (let i = 0; i < 16; i++) {
                for (let j = 0; j < 16; j++) {
                    if (Math.random() > 0.8) {
                        ctx.fillStyle = noiseColor;
                        ctx.fillRect(i, j, 1, 1);
                    }
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; // Keep it crisp
            return texture;
        }

        const textures = {
            grass: createTexture('#55aa55', '#4a9a4a'),
            dirt: createTexture('#8b5a2b', '#7a4a1b'),
            stone: createTexture('#888888', '#777777')
        };

        // --- 4. WORLD GENERATION ---
        const blocks = new Map(); // Store blocks as "x,y,z" -> Mesh
        const worldSize = 16;
        const geometry = new THREE.BoxGeometry(1, 1, 1);

        function getBlockKey(x, y, z) { return `${x},${y},${z}`; }

        function addBlock(x, y, z, type) {
            const material = new THREE.MeshLambertMaterial({ map: textures[type] });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.userData.type = type;
            scene.add(mesh);
            blocks.set(getBlockKey(x, y, z), mesh);
        }

        // Simple noise function using sine waves
        function getTerrainHeight(x, z) {
            return Math.floor(Math.sin(x * 0.3) * 2 + Math.cos(z * 0.3) * 2 + 3);
        }

        // Generate a small island
        for (let x = -worldSize; x <= worldSize; x++) {
            for (let z = -worldSize; z <= worldSize; z++) {
                const y = getTerrainHeight(x, z);
                addBlock(x, y, z, 'grass');
                addBlock(x, y - 1, z, 'dirt');
                addBlock(x, y - 2, z, 'stone');
                addBlock(x, y - 3, z, 'stone');
            }
        }

        // --- 5. CONTROLS ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        const overlay = document.getElementById('overlay');
        
        overlay.addEventListener('click', () => { controls.lock(); });
        controls.addEventListener('lock', () => { overlay.style.display = 'none'; });
        controls.addEventListener('unlock', () => { overlay.style.display = 'flex'; });

        // Movement state
        const move = { forward: false, backward: false, left: false, right: false, jump: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': move.forward = true; break;
                case 'KeyS': move.backward = true; break;
                case 'KeyA': move.left = true; break;
                case 'KeyD': move.right = true; break;
                case 'Space': move.jump = true; break;
                case 'Digit1': selectBlock(1); break;
                case 'Digit2': selectBlock(2); break;
                case 'Digit3': selectBlock(3); break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': move.forward = false; break;
                case 'KeyS': move.backward = false; break;
                case 'KeyA': move.left = false; break;
                case 'KeyD': move.right = false; break;
                case 'Space': move.jump = false; break;
            }
        });

        // --- 6. BLOCK INTERACTION (Break & Place) ---
        const raycaster = new THREE.Raycaster();
        raycaster.far = 6; // Reach distance
        
        let selectedBlockType = 'grass';
        const blockTypes = ['grass', 'dirt', 'stone'];

        function selectBlock(num) {
            selectedBlockType = blockTypes[num - 1];
            document.querySelectorAll('.slot').forEach((el, i) => {
                el.classList.toggle('active', i === num - 1);
            });
            document.getElementById('hud').innerText = `Selected: ${selectedBlockType.charAt(0).toUpperCase() + selectedBlockType.slice(1)}`;
        }

        document.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(Array.from(blocks.values()));

            if (intersects.length > 0) {
                const hit = intersects[0];
                
                // Left click: Break block
                if (e.button === 0) {
                    const pos = hit.object.position;
                    const key = getBlockKey(pos.x, pos.y, pos.z);
                    scene.remove(hit.object);
                    blocks.delete(key);
                } 
                // Right click: Place block
                else if (e.button === 2) {
                    const placePos = hit.object.position.clone().add(hit.face.normal);
                    
                    // Prevent placing block inside the player
                    const distToPlayer = placePos.distanceTo(camera.position);
                    if (distToPlayer > 1.5) {
                        addBlock(placePos.x, placePos.y, placePos.z, selectedBlockType);
                    }
                }
            }
        });

        // Prevent context menu on right click
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        // --- 7. PHYSICS & COLLISION ---
        const playerHeight = 1.8;
        const playerWidth = 0.6;
        let onGround = false;

        function checkCollision(x, y, z) {
            // Player is treated as an AABB (Axis-Aligned Bounding Box)
            // Check blocks around the player's feet and head
            const minX = Math.floor(x - playerWidth / 2);
            const maxX = Math.floor(x + playerWidth / 2);
            const minY = Math.floor(y - playerHeight);
            const maxY = Math.floor(y);
            const minZ = Math.floor(z - playerWidth / 2);
            const maxZ = Math.floor(z + playerWidth / 2);

            for (let bx = minX; bx <= maxX; bx++) {
                for (let by = minY; by <= maxY; by++) {
                    for (let bz = minZ; bz <= maxZ; bz++) {
                        if (blocks.has(getBlockKey(bx, by, bz))) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // --- 8. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                // Apply gravity
                velocity.y -= 0.015; // Gravity strength
                if (velocity.y < -0.5) velocity.y = -0.5; // Terminal velocity

                // Calculate movement direction
                direction.z = Number(move.forward) - Number(move.backward);
                direction.x = Number(move.right) - Number(move.left);
                direction.normalize();

                const speed = 0.15;
                let dx = 0, dz = 0;
                
                if (move.forward || move.backward) dz = direction.z * speed;
                if (move.left || move.right) dx = direction.x * speed;

                // Jump
                if (move.jump && onGround) {
                    velocity.y = 0.25; // Jump height
                    onGround = false;
                }

                // Attempt X axis movement
                let newX = camera.position.x + dx;
                if (!checkCollision(newX, camera.position.y, camera.position.z)) {
                    camera.position.x = newX;
                }

                // Attempt Z axis movement
                let newZ = camera.position.z + dz;
                if (!checkCollision(camera.position.x, camera.position.y, newZ)) {
                    camera.position.z = newZ;
                }

                // Attempt Y axis movement
                let newY = camera.position.y + velocity.y;
                if (!checkCollision(camera.position.x, newY, camera.position.z)) {
                    camera.position.y = newY;
                    onGround = false;
                } else {
                    // If we hit something while falling, we are on the ground
                    if (velocity.y < 0) {
                        onGround = true;
                    }
                    velocity.y = 0;
                }
            }

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Set initial spawn position above the terrain
        camera.position.y = getTerrainHeight(0, 0) + 3;

        animate();
    </script>
</body>
</html>
