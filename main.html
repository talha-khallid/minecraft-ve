<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Craft</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #87CEEB; }
        canvas { display: block; }
        
        /* Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            pointer-events: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.8);
            box-shadow: 0 0 2px rgba(0,0,0,0.8);
        }
        #crosshair::before { width: 2px; height: 20px; left: 9px; }
        #crosshair::after { width: 20px; height: 2px; top: 9px; }

        /* HUD and Instructions */
        #hud {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5); color: white;
            padding: 10px 20px; border-radius: 5px;
            font-size: 14px; z-index: 10; text-align: center;
        }
        #hotbar {
            position: absolute; bottom: 60px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 5px; z-index: 10;
        }
        .slot {
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: white;
        }
        .slot.active { border-color: white; background: rgba(255,255,255,0.2); }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; cursor: pointer;
        }
        h1 { font-size: 3em; margin-bottom: 10px; text-shadow: 2px 2px 0px #555; }
        p { font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>VOXELCRAFT</h1>
        <p>Click to Play</p>
        <p style="font-size: 0.9em; opacity: 0.7;">WASD to move | Space to jump | Mouse to look | Left-Click to break | Right-Click to place | 1-3 to select block</p>
    </div>

    <div id="crosshair"></div>
    
    <div id="hotbar">
        <div class="slot active" id="slot-1">🟩</div>
        <div class="slot" id="slot-2">🟫</div>
        <div class="slot" id="slot-3">⬜</div>
    </div>

    <div id="hud">Selected: Grass</div>

    <!-- Three.js Library (Primary CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Fallback CDN just in case cdnjs is blocked -->
    <script>
        if (typeof THREE === 'undefined') {
            document.write('<script src="https://unpkg.com/three@0.128.0/build/three.min.js"><\/script>');
        }
    </script>

    <script>
        // Global error catcher: If Three.js still fails to load, show an error instead of silently failing
        window.onerror = function(message, source, lineno, colno, error) {
            if (typeof THREE === 'undefined') {
                document.body.innerHTML = '<div style="color:white; background:black; padding:50px; font-family:monospace; position:absolute; top:0; left:0; width:100%; height:100%; z-index:1000;">GAME CRASHED:<br>Could not load Three.js library. Please check your internet connection.<br><br>Error: ' + message + '</div>';
            }
        };

        // --- 1. SETUP SCENE, CAMERA, RENDERER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 20, 60); // Fog for performance and aesthetics

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ'; // Essential for FPS camera rotation

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // --- 3. PROCEDURAL TEXTURES & MATERIALS ---
        function createTexture(color, noiseColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, 16, 16);
            for (let i = 0; i < 16; i++) {
                for (let j = 0; j < 16; j++) {
                    if (Math.random() > 0.8) {
                        ctx.fillStyle = noiseColor;
                        ctx.fillRect(i, j, 1, 1);
                    }
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        // Cache materials to save performance
        const materials = {
            grass: new THREE.MeshLambertMaterial({ map: createTexture('#55aa55', '#4a9a4a') }),
            dirt: new THREE.MeshLambertMaterial({ map: createTexture('#8b5a2b', '#7a4a1b') }),
            stone: new THREE.MeshLambertMaterial({ map: createTexture('#888888', '#777777') })
        };

        // --- 4. WORLD GENERATION ---
        const blocks = new Map(); // Store blocks as "x,y,z" -> Mesh
        const worldSize = 16;
        const geometry = new THREE.BoxGeometry(1, 1, 1);

        function getBlockKey(x, y, z) { return `${Math.round(x)},${Math.round(y)},${Math.round(z)}`; }

        function addBlock(x, y, z, type) {
            const mesh = new THREE.Mesh(geometry, materials[type]);
            mesh.position.set(Math.round(x), Math.round(y), Math.round(z));
            mesh.userData.type = type;
            scene.add(mesh);
            blocks.set(getBlockKey(x, y, z), mesh);
        }

        // Simple noise function using sine waves
        function getTerrainHeight(x, z) {
            return Math.floor(Math.sin(x * 0.3) * 2 + Math.cos(z * 0.3) * 2 + 5);
        }

        // Generate a small island
        for (let x = -worldSize; x <= worldSize; x++) {
            for (let z = -worldSize; z <= worldSize; z++) {
                const y = getTerrainHeight(x, z);
                addBlock(x, y, z, 'grass');
                addBlock(x, y - 1, z, 'dirt');
                addBlock(x, y - 2, z, 'stone');
                addBlock(x, y - 3, z, 'stone');
            }
        }

        // --- 5. GAME STATE & POINTER LOCK ---
        let isPlaying = false; // <--- This is the fix. We decouple game logic from pointer lock state
        let yaw = 0, pitch = 0;
        const overlay = document.getElementById('overlay');
        
        overlay.addEventListener('click', () => {
            isPlaying = true;
            overlay.style.display = 'none'; // Hide overlay immediately
            
            // Attempt to lock pointer (works in normal browser tabs, may fail in iframes)
            const el = renderer.domElement;
            if (el.requestPointerLock) {
                el.requestPointerLock();
            } else if (el.mozRequestPointerLock) {
                el.mozRequestPointerLock();
            } else if (el.webkitRequestPointerLock) {
                el.webkitRequestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            // If the user presses ESC and unlocks the mouse, pause the game
            if (document.pointerLockElement !== renderer.domElement && isPlaying) {
                isPlaying = false;
                overlay.style.display = 'flex';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isPlaying) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, pitch));
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
            }
        });

        // Movement state
        const move = { forward: false, backward: false, left: false, right: false, jump: false };
        const velocity = new THREE.Vector3();
        let onGround = false;
        
        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            switch(e.code) {
                case 'KeyW': move.forward = true; break;
                case 'KeyS': move.backward = true; break;
                case 'KeyA': move.left = true; break;
                case 'KeyD': move.right = true; break;
                case 'Space': move.jump = true; break;
                case 'Digit1': selectBlock(1); break;
                case 'Digit2': selectBlock(2); break;
                case 'Digit3': selectBlock(3); break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': move.forward = false; break;
                case 'KeyS': move.backward = false; break;
                case 'KeyA': move.left = false; break;
                case 'KeyD': move.right = false; break;
                case 'Space': move.jump = false; break;
            }
        });

        // --- 6. BLOCK INTERACTION (Break & Place) ---
        const raycaster = new THREE.Raycaster();
        raycaster.far = 6; // Reach distance
        
        let selectedBlockType = 'grass';
        const blockTypes = ['grass', 'dirt', 'stone'];

        function selectBlock(num) {
            selectedBlockType = blockTypes[num - 1];
            document.querySelectorAll('.slot').forEach((el, i) => {
                el.classList.toggle('active', i === num - 1);
            });
            document.getElementById('hud').innerText = `Selected: ${selectedBlockType.charAt(0).toUpperCase() + selectedBlockType.slice(1)}`;
        }

        document.addEventListener('mousedown', (e) => {
            if (!isPlaying) return; // <--- Only allow breaking blocks if game is playing
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(Array.from(blocks.values()));

            if (intersects.length > 0) {
                const hit = intersects[0];
                const blockPos = hit.object.position;
                
                // Left click: Break block
                if (e.button === 0) {
                    const key = getBlockKey(blockPos.x, blockPos.y, blockPos.z);
                    scene.remove(hit.object);
                    blocks.delete(key);
                } 
                // Right click: Place block
                else if (e.button === 2) {
                    const intersectPoint = hit.point;
                    const dx = intersectPoint.x - blockPos.x;
                    const dy = intersectPoint.y - blockPos.y;
                    const dz = intersectPoint.z - blockPos.z;
                    
                    let nx = 0, ny = 0, nz = 0;
                    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > Math.abs(dz)) nx = Math.sign(dx);
                    else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > Math.abs(dz)) ny = Math.sign(dy);
                    else nz = Math.sign(dz);
                    
                    const placePos = blockPos.clone().add(new THREE.Vector3(nx, ny, nz));
                    
                    // Prevent placing block inside the player
                    if (placePos.distanceTo(camera.position) > 2.0) {
                        addBlock(placePos.x, placePos.y, placePos.z, selectedBlockType);
                    }
                }
            }
        });

        // Prevent context menu on right click
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        // --- 7. PHYSICS & AABB COLLISION DETECTION ---
        function checkCollision(x, y, z) {
            const playerWidth = 0.3;
            const playerHeight = 1.8;
            const feetY = y - playerHeight;
            
            const startX = Math.floor(x - playerWidth + 0.5);
            const endX = Math.floor(x + playerWidth + 0.5);
            const startY = Math.floor(feetY + 0.5);
            const endY = Math.floor(y + 0.5);
            const startZ = Math.floor(z - playerWidth + 0.5);
            const endZ = Math.floor(z + playerWidth + 0.5);

            for (let bx = startX; bx <= endX; bx++) {
                for (let by = startY; by <= endY; by++) {
                    for (let bz = startZ; bz <= endZ; bz++) {
                        if (blocks.has(getBlockKey(bx, by, bz))) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // --- 8. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            try {
                if (isPlaying) { // <--- Only run physics if playing
                    // Apply gravity
                    velocity.y -= 0.015; 
                    if (velocity.y < -0.5) velocity.y = -0.5; 

                    // Calculate movement direction based on yaw
                    const speed = 0.15;
                    const forwardX = -Math.sin(yaw);
                    const forwardZ = -Math.cos(yaw);
                    const rightX = Math.cos(yaw);
                    const rightZ = -Math.sin(yaw);

                    let moveX = 0, moveZ = 0;
                    if (move.forward) { moveX += forwardX; moveZ += forwardZ; }
                    if (move.backward) { moveX -= forwardX; moveZ -= forwardZ; }
                    if (move.right) { moveX += rightX; moveZ += rightZ; }
                    if (move.left) { moveX -= rightX; moveZ -= rightZ; }

                    // Normalize diagonal movement so it's not faster
                    const len = Math.hypot(moveX, moveZ);
                    if (len > 0) {
                        moveX = (moveX / len) * speed;
                        moveZ = (moveZ / len) * speed;
                    }

                    // Jump
                    if (move.jump && onGround) {
                        velocity.y = 0.25; 
                        onGround = false;
                    }

                    // Attempt X axis movement
                    let newX = camera.position.x + moveX;
                    if (!checkCollision(newX, camera.position.y, camera.position.z)) {
                        camera.position.x = newX;
                    }

                    // Attempt Z axis movement
                    let newZ = camera.position.z + moveZ;
                    if (!checkCollision(camera.position.x, camera.position.y, newZ)) {
                        camera.position.z = newZ;
                    }

                    // Attempt Y axis movement (Falling/Jumping)
                    let newY = camera.position.y + velocity.y;
                    if (!checkCollision(camera.position.x, newY, camera.position.z)) {
                        camera.position.y = newY;
                        onGround = false;
                    } else {
                        // If we hit something while falling, we are on the ground
                        if (velocity.y < 0) {
                            onGround = true;
                        }
                        velocity.y = 0;
                    }
                }

                renderer.render(scene, camera);
            } catch (err) {
                console.error("Game loop error:", err);
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Set initial spawn position slightly above the terrain
        camera.position.set(0, getTerrainHeight(0, 0) + 3, 0);

        animate();
    </script>
</body>
</html>
